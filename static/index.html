<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Booking</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface-hover: #252525;
        --border: #333;
        --text: #e0e0e0;
        --text-muted: #888;
        --available: #2a2a2a;
        --available-hover: #3a3a3a;
        --held-mine: #d4a017;
        --held-other: #e06c00;
        --confirmed: #c0392b;
        --accent: #4fc3f7;
        --danger: #e74c3c;
        --font: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 2rem;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .user-id {
        font-size: 0.75rem;
        color: var(--text-muted);
        background: var(--surface);
        padding: 0.3rem 0.6rem;
        border-radius: 4px;
      }

      .movies {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }

      .movie-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.2rem 1.6rem;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        min-width: 180px;
      }

      .movie-card:hover {
        background: var(--surface-hover);
        border-color: var(--accent);
      }

      .movie-card.selected {
        border-color: var(--accent);
        background: var(--surface-hover);
      }

      .movie-card h3 {
        font-size: 1rem;
        margin-bottom: 0.4rem;
      }

      .movie-card p {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .content {
        display: flex;
        gap: 2rem;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .screen-area {
        flex: 1;
        min-width: 300px;
      }

      .screen-label {
        text-align: center;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--text-muted);
        margin-bottom: 0.6rem;
      }

      .screen-bar {
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        border-radius: 2px;
        margin: 0 2rem 1.5rem;
      }

      .seat-grid {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .seat-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .row-label {
        width: 1.5rem;
        font-size: 0.7rem;
        color: var(--text-muted);
        text-align: center;
      }

      .seat {
        width: 36px;
        height: 32px;
        border-radius: 6px 6px 3px 3px;
        border: none;
        cursor: pointer;
        font-size: 0.65rem;
        font-family: var(--font);
        color: var(--text-muted);
        background: var(--available);
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .seat:hover:not(.seat--held-mine):not(.seat--held-other):not(
          .seat--confirmed
        ) {
        background: var(--available-hover);
        transform: scale(1.08);
      }

      .seat--held-mine {
        background: var(--held-mine);
        color: #000;
        cursor: default;
      }

      .seat--held-other {
        background: var(--held-other);
        color: #fff;
        cursor: not-allowed;
      }

      .seat--confirmed {
        background: var(--confirmed);
        color: #fff;
        cursor: not-allowed;
      }

      .legend {
        display: flex;
        gap: 1.2rem;
        justify-content: center;
        margin-top: 1.5rem;
        flex-wrap: wrap;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.7rem;
        color: var(--text-muted);
      }

      .legend-swatch {
        width: 14px;
        height: 12px;
        border-radius: 3px 3px 2px 2px;
      }

      .checkout {
        width: 280px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.4rem;
      }

      .checkout h3 {
        font-size: 0.85rem;
        margin-bottom: 1rem;
        color: var(--accent);
      }

      .checkout-info {
        font-size: 0.8rem;
        margin-bottom: 0.6rem;
      }

      .checkout-info span {
        color: var(--text-muted);
      }

      .timer {
        font-size: 1.8rem;
        font-weight: 700;
        text-align: center;
        margin: 1rem 0;
        color: var(--held-mine);
        transition: color 0.3s;
      }

      .timer.urgent {
        color: var(--danger);
      }

      .checkout-buttons {
        display: flex;
        gap: 0.6rem;
      }

      .btn {
        flex: 1;
        padding: 0.6rem;
        border: none;
        border-radius: 6px;
        font-family: var(--font);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .btn:hover {
        opacity: 0.85;
      }

      .btn--confirm {
        background: #27ae60;
        color: #fff;
      }

      .btn--release {
        background: var(--danger);
        color: #fff;
      }

      .status-msg {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .status-msg.success {
        color: #27ae60;
      }
      .status-msg.error {
        color: var(--danger);
      }

      .empty-state {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        padding: 3rem 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Cinema Booking</h1>
      <div class="user-id" id="userBadge"></div>
    </header>

    <div class="movies" id="movieList"></div>

    <div class="content" id="mainContent" style="display: none">
      <div class="screen-area">
        <div class="screen-label">Screen</div>
        <div class="screen-bar"></div>
        <div class="seat-grid" id="seatGrid"></div>
        <div class="legend">
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--available)"
            ></div>
            Available
          </div>
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--held-mine)"
            ></div>
            Your hold
          </div>
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--held-other)"
            ></div>
            Other hold
          </div>
          <div class="legend-item">
            <div
              class="legend-swatch"
              style="background: var(--confirmed)"
            ></div>
            Confirmed
          </div>
        </div>
      </div>
      <div id="checkoutArea"></div>
    </div>

        <script>
      (function () {
        // Генерация ID пользователя
        const userID = crypto.randomUUID().replace(/-/g, "").slice(0, 12);
        document.getElementById("userBadge").textContent = "user: " + userID;

        let selectedMovie = null;
        let activeSession = null; // { sessionID, movieID, seatID, expiresAt }
        let pollInterval = null;
        let timerInterval = null;

        // Элементы DOM
        const movieListEl = document.getElementById("movieList");
        const mainContentEl = document.getElementById("mainContent");
        const seatGridEl = document.getElementById("seatGrid");
        const checkoutAreaEl = document.getElementById("checkoutArea");

        // Демо-данные фильмов (замените на свои, если загружаете с сервера)
        const movies = [
          { id: "movie-1", title: "Dune: Part Two", genre: "Sci-Fi" },
          { id: "movie-2", title: "Oppenheimer", genre: "Biography" }
        ];

        // --- Исправленный API хелпер ---
        async function api(method, path, body) {
          const opts = { method, headers: {} };
          if (body) {
            opts.headers["Content-Type"] = "application/json";
            opts.body = JSON.stringify(body);
          }

          const response = await fetch(path, opts);

          // Обработка успешного удаления / освобождения (204 No Content)
          if (response.status === 204) {
            return null;
          }

          // Если сервер вернул ошибку (4xx или 5xx)
          if (!response.ok) {
            let errMsg = "Произошла ошибка";
            try {
              const errData = await response.json();
              errMsg = errData.error || errMsg;
            } catch (e) {
              // Если тело ответа совсем пустое
              errMsg = `Ошибка сервера: ${response.status}`;
            }
            throw new Error(errMsg);
          }

          // Для всех остальных успешных запросов парсим JSON
          return await response.json();
        }

        // --- Логика приложения ---

        function init() {
          movies.forEach(movie => {
            const card = document.createElement("div");
            card.className = "movie-card";
            card.innerHTML = `<h3>${movie.title}</h3><p>${movie.genre}</p>`;
            card.onclick = () => selectMovie(movie);
            movieListEl.appendChild(card);
          });
        }

        function selectMovie(movie) {
          selectedMovie = movie;
          document.querySelectorAll(".movie-card").forEach(c => c.classList.remove("selected"));
          event.currentTarget.classList.add("selected");
          
          mainContentEl.style.display = "flex";
          renderGrid();
          startPolling();
        }

        async function renderGrid() {
          if (!selectedMovie) return;
          
          try {
            // Маршрут к вашему Go хендлеру ListSeats
            const bookedSeats = await api("GET", `/movies/${selectedMovie.id}/seats`);
            const bookedMap = new Map(bookedSeats.map(s => [s.seat_id, s]));

            seatGridEl.innerHTML = "";
            const rows = ["A", "B", "C", "D", "E"];
            const cols = 8;

            rows.forEach(row => {
              const rowEl = document.createElement("div");
              rowEl.className = "seat-row";

              const label = document.createElement("div");
              label.className = "row-label";
              label.textContent = row;
              rowEl.appendChild(label);

              for (let i = 1; i <= cols; i++) {
                const seatID = `${row}${i}`;
                const seatBtn = document.createElement("button");
                seatBtn.className = "seat";
                seatBtn.textContent = seatID;

                const booking = bookedMap.get(seatID);
                if (booking) {
                  if (booking.confirmed) {
                    seatBtn.classList.add("seat--confirmed");
                  } else if (booking.user_id === userID) {
                    seatBtn.classList.add("seat--held-mine");
                  } else {
                    seatBtn.classList.add("seat--held-other");
                  }
                } else {
                  seatBtn.onclick = () => holdSeat(seatID);
                }

                rowEl.appendChild(seatBtn);
              }
              seatGridEl.appendChild(rowEl);
            });
          } catch (err) {
            console.error(err);
          }
        }

        async function holdSeat(seatID) {
          if (activeSession) {
            alert("У вас уже есть активная бронь! Отмените её или подтвердите.");
            return;
          }

          try {
            // Маршрут к вашему Go хендлеру HoldSeat
            const res = await api("POST", `/movies/${selectedMovie.id}/seats/${seatID}`, { user_id: userID });
            
            activeSession = {
              sessionID: res.session_id,
              movieID: res.movieID,
              seatID: res.seat_id,
              expiresAt: new Date(res.expires_at)
            };

            renderGrid();
            renderCheckout();
            startTimer();
          } catch (err) {
            // Выводим ошибку "Место уже забронировано", которую прислал Go сервер
            alert(err.message); 
            renderGrid(); // Обновляем сетку, чтобы показать актуальные места
          }
        }

        function renderCheckout() {
          if (!activeSession) {
            checkoutAreaEl.innerHTML = '<div class="checkout empty-state">Выберите место для бронирования</div>';
            return;
          }

          checkoutAreaEl.innerHTML = `
            <div class="checkout">
              <h3>Ваше бронирование</h3>
              <div class="checkout-info">Фильм: <span>${selectedMovie.title}</span></div>
              <div class="checkout-info">Место: <span>${activeSession.seatID}</span></div>
              <div class="timer" id="timerDisplay">00:00</div>
              <div class="checkout-buttons">
                <button class="btn btn--confirm" id="btnConfirm">Купить</button>
                <button class="btn btn--release" id="btnRelease">Отмена</button>
              </div>
              <div class="status-msg" id="statusMsg"></div>
            </div>
          `;

          document.getElementById("btnConfirm").onclick = confirmBooking;
          document.getElementById("btnRelease").onclick = releaseBooking;
        }

        async function confirmBooking() {
          const msgEl = document.getElementById("statusMsg");
          try {
            // Маршрут к вашему Go хендлеру ConfirmSession
            await api("POST", `/sessions/${activeSession.sessionID}/confirm`, { user_id: userID });
            msgEl.className = "status-msg success";
            msgEl.textContent = "Успешно подтверждено!";
            clearSession();
            setTimeout(() => { renderCheckout(); renderGrid(); }, 1500);
          } catch (err) {
            msgEl.className = "status-msg error";
            msgEl.textContent = err.message;
          }
        }

        async function releaseBooking() {
          if (!activeSession) return;
          try {
            // Маршрут к вашему Go хендлеру ReleaseSession
            await api("POST", `/sessions/${activeSession.sessionID}/release`, { user_id: userID });
            clearSession();
            renderCheckout();
            renderGrid();
          } catch (err) {
            alert(err.message);
          }
        }

        function startTimer() {
          clearInterval(timerInterval);
          const display = document.getElementById("timerDisplay");
          if (!display || !activeSession) return;

          function update() {
            const now = new Date();
            const diff = activeSession.expiresAt - now;

            if (diff <= 0) {
              clearInterval(timerInterval);
              clearSession();
              renderCheckout();
              renderGrid();
              alert("Время бронирования истекло!");
              return;
            }

            const mins = Math.floor(diff / 60000).toString().padStart(2, "0");
            const secs = Math.floor((diff % 60000) / 1000).toString().padStart(2, "0");
            display.textContent = `${mins}:${secs}`;

            if (diff < 30000) display.classList.add("urgent");
          }

          update();
          timerInterval = setInterval(update, 1000);
        }

        function clearSession() {
          activeSession = null;
          clearInterval(timerInterval);
        }

        function startPolling() {
          clearInterval(pollInterval);
          pollInterval = setInterval(renderGrid, 5000);
        }

        init();
      })();
    </script>
  </body>
</html>
